name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔥 FIX: Complete credential helper disable
      - name: Disable Docker credential helpers
        run: |
          # Nuke existing config
          rm -rf ~/.docker
          mkdir -p ~/.docker
          
          # Create clean config with NO credential helpers
          cat > ~/.docker/config.json << 'EOF'
          {
            "auths": {},
            "credsStore": "",
            "credHelpers": {}
          }
          EOF
          
          # Kill any credential helper processes
          pkill -f docker-credential 2>/dev/null || true
          
          # Set environment variable
          echo "DOCKER_CONFIG=~/.docker" >> $GITHUB_ENV
          
          echo "✅ Docker credential helpers disabled"

      # 🔑 Direct login with config file approach
      - name: Docker Login
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          # Create auth string
          AUTH=$(echo -n "${DOCKER_USER}:${DOCKER_PASS}" | base64)
          
          # Update config with credentials
          cat > ~/.docker/config.json << EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "${AUTH}"
              }
            },
            "credsStore": "",
            "credHelpers": {}
          }
          EOF
          
          echo "✅ Docker credentials configured"
          
          # Test authentication silently
          if docker pull ${DOCKER_USER}/hello-world:latest 2>/dev/null; then
            echo "✅ Authentication verified"
          else
            echo "⚠️ Authentication verification failed, but continuing..."
          fi

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }} .
          echo "✅ Docker image built"

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}
          echo "✅ Docker image pushed"

      - name: Check Deployment
        id: check-deploy
        run: |
          if kubectl get deployment cloud-native-app &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Kubernetes
        if: steps.check-deploy.outputs.exists == 'true'
        run: |
          kubectl set image deployment/cloud-native-app \
            cloud-native-app=${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}
          kubectl rollout status deployment/cloud-native-app
          echo "✅ Deployment updated"
