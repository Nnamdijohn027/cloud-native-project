name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # ← CHANGED FROM ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Disable Docker credential helper
        run: |
          mkdir -p ~/.docker
          echo '{"credsStore": "none"}' > ~/.docker/config.json  

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/cloud-native-app cloud-native-app=${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}
          kubectl rollout status deployment/cloud-native-app